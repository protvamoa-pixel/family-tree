<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Семейное Древо на Supabase</title>
    <!-- Подключаем Supabase -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #3ecf8e; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #36b37a; }
        .tree-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; position: relative; }
        .card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; background: #f0f0f0; }
        .del { position: absolute; top: 10px; right: 10px; color: #ff4d4d; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌲 Семейное Древо (Supabase)</h1>
    <div class="form-grid">
        <input type="text" id="name" placeholder="Имя Фамилия">
        <input type="text" id="role" placeholder="Роль">
        <input type="file" id="photo" accept="image/*">
        <select id="parent1"><option value="">Отец</option></select>
        <select id="parent2"><option value="">Мать</option></select>
        <button onclick="addMember()">Добавить</button>
    </div>
    <div id="treeDisplay" class="tree-grid"></div>
</div>

<script>
    // ВСТАВЬТЕ ВАШИ ДАННЫЕ ИЗ SUPABASE SETTINGS -> API
    const SUPABASE_URL = 'https://xllgydydyjakmiauefuw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsbGd5ZHlkeWpha21pYXVlZnV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzc0ODAsImV4cCI6MjA5MzExMzQ4MH0.gpjxke6u7lztzCPsaVgvAZOOLwjvkBYCE6t5vjXkHy8';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Загрузка данных
    async function loadFamily() {
        const { data, error } = await _supabase.from('family').select('*').order('created_at');
        if (error) console.error(error);
        else render(data);
    }

    // Добавление участника
    async function addMember() {
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;
        const p1 = document.getElementById('parent1').value;
        const p2 = document.getElementById('parent2').value;
        const file = document.getElementById('photo').files[0];

        if (!name) return alert("Введите имя!");

        let photoBase64 = '';
        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                photoBase64 = reader.result;
                await sendToSupabase(name, role, p1, p2, photoBase64);
            };
        } else {
            await sendToSupabase(name, role, p1, p2, '');
        }
    }

    async function sendToSupabase(name, role, p1, p2, photo) {
        const { error } = await _supabase.from('family').insert([{ name, role, p1, p2, photo }]);
        if (error) alert("Ошибка: " + error.message);
        else {
            document.getElementById('name').value = '';
            loadFamily();
        }
    }

    async function deleteMember(id) {
        if (!confirm("Удалить?")) return;
        await _supabase.from('family').delete().eq('id', id);
        loadFamily();
    }

    function render(family) {
        const display = document.getElementById('treeDisplay');
        const s1 = document.getElementById('parent1');
        const s2 = document.getElementById('parent2');
        
        display.innerHTML = '';
        const options = family.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
        s1.innerHTML = '<option value="">Отец</option>' + options;
        s2.innerHTML = '<option value="">Мать</option>' + options;

        family.forEach(m => {
            display.innerHTML += `
                <div class="card">
                    <span class="del" onclick="deleteMember('${m.id}')">&times;</span>
                    <img src="${m.photo || 'https://placeholder.com'}">
                    <h3>${m.name}</h3>
                    <p>${m.role}</p>
                </div>
            `;
        });
    }

    loadFamily();
</script>
</body>
</html>
