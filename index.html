<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Общее Семейное Древо</title>
    <!-- Подключаем Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        /* (Стили оставляем те же, что были в предыдущем ответе) */
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        .tree-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { width: 200px; border: 1px solid #ddd; padding: 10px; text-align: center; background: #fff; border-radius: 8px; position: relative; }
        .card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        button { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; }
        .del { position: absolute; top: 5px; right: 5px; cursor: pointer; color: red; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 Общее Семейное Древо</h1>
    <div class="form-grid">
        <input type="text" id="name" placeholder="Имя Фамилия">
        <input type="text" id="role" placeholder="Роль">
        <input type="file" id="photo" accept="image/*">
        <select id="parent1"><option value="">Отец</option></select>
        <select id="parent2"><option value="">Мать</option></select>
        <button onclick="addMember()">Добавить для всех</button>
    </div>
    <div class="tree-grid" id="treeDisplay"></div>
</div>

<script>
    // КОНФИГУРАЦИЯ FIREBASE (Вставь свои данные здесь!)
    const firebaseConfig = {
        apiKey: "AIzaSyCcF9h3nRYe-O9cliwcysEMoTS71XWzaqI",
        authDomain: "family-tree-6f627.firebaseapp.com",
        databaseURL: "https://family-tree-6f627-default-rtdb.firebaseio.com",
        projectId: "family-tree-6f627",
        storageBucket: "family-tree-6f627.firebasestorage.app",
    };

    // Инициализация
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Загрузка данных в реальном времени
    db.ref('family').on('value', (snapshot) => {
        const data = snapshot.val();
        const familyArray = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
        render(familyArray);
    });

    function addMember() {
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;
        const p1 = document.getElementById('parent1').value;
        const p2 = document.getElementById('parent2').value;
        const file = document.getElementById('photo').files[0];

        if (!name) return alert("Имя обязательно!");

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('family').push({ name, role, p1, p2, photo: e.target.result });
            };
            reader.readAsDataURL(file);
        } else {
            db.ref('family').push({ name, role, p1, p2, photo: '' });
        }
    }

    function deleteMember(id) {
        if(confirm("Удалить родственника?")) {
            db.ref('family/' + id).remove();
        }
    }

    function render(family) {
        const display = document.getElementById('treeDisplay');
        const s1 = document.getElementById('parent1');
        const s2 = document.getElementById('parent2');
        
        display.innerHTML = '';
        s1.innerHTML = '<option value="">Отец</option>';
        s2.innerHTML = '<option value="">Мать</option>';

        family.forEach(m => {
            s1.innerHTML += `<option value="${m.id}">${m.name}</option>`;
            s2.innerHTML += `<option value="${m.id}">${m.name}</option>`;

            display.innerHTML += `
                <div class="card">
                    <span class="del" onclick="deleteMember('${m.id}')">×</span>
                    <img src="${m.photo || 'https://placeholder.com'}">
                    <h3>${m.name}</h3>
                    <p>${m.role}</p>
                </div>
            `;
        });
    }
</script>
</body>
</html>
