<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Семейное Древо — Прямое подключение</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 15px; background: #eee; border-radius: 8px; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #3ecf8e; color: white; cursor: pointer; border: none; font-weight: bold; }
        .tree { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { width: 180px; border: 1px solid #ddd; padding: 10px; text-align: center; background: #fff; border-radius: 8px; position: relative; }
        .card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .del { position: absolute; top: 5px; right: 5px; cursor: pointer; color: red; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌲 Семейное Древо</h1>
    <div class="form">
        <input type="text" id="name" placeholder="Имя Фамилия">
        <input type="text" id="role" placeholder="Роль">
        <input type="file" id="photo" accept="image/*">
        <select id="p1"><option value="">Отец</option></select>
        <select id="p2"><option value="">Мать</option></select>
        <button onclick="addMember()">Добавить</button>
    </div>
    <div class="tree" id="display"></div>
</div>

<script>
    // ПРОВЕРЬТЕ, ЧТО ЗДЕСЬ СТОЯТ ВАШИ ДАННЫЕ В КАВЫЧКАХ
    const URL = 'https://xllgydydyjakmiauefuw.supabase.co'; 
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsbGd5ZHlkeWpha21pYXVlZnV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzc0ODAsImV4cCI6MjA5MzExMzQ4MH0.gpjxke6u7lztzCPsaVgvAZOOLwjvkBYCE6t5vjXkHy8';

    // Функция для работы с базой (теперь KEY точно будет виден)
    async function api(method, body = null, id = '') {
        try {
            const options = {
                method: method,
                headers: {
                    'apikey': KEY,
                    'Authorization': 'Bearer ' + KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`${URL}/rest/v1/family${id ? '?id=eq.' + id : ''}`, options);
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText);
            }
            
            return await response.json();
        } catch (err) {
            console.error("Ошибка API:", err.message);
            if (err.message.includes('JWT')) alert("Ошибка ключа (KEY). Проверьте, правильно ли вы его скопировали.");
        }
    }

    async function load() {
        if (!URL || URL.includes('ВАШ_')) return;
        const data = await api('GET');
        if (data) render(data);
    }

    async function addMember() {
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;
        const parent1 = document.getElementById('p1').value;
        const parent2 = document.getElementById('p2').value;
        const fileInput = document.getElementById('photo');

        if (!name) return alert("Введите имя");

        const saveData = async (base64Photo) => {
            const result = await api('POST', { 
                name: name, 
                role: role, 
                p1: parent1, 
                p2: parent2, 
                photo: base64Photo 
            });
            if (result) {
                alert("Добавлено!");
                location.reload();
            }
        };

        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = () => saveData(reader.result);
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            await saveData('');
        }
    }

    async function remove(id) {
        if (confirm("Удалить?")) {
            await api('DELETE', null, id);
            load();
        }
    }

    function render(family) {
        const container = document.getElementById('display');
        const s1 = document.getElementById('p1');
        const s2 = document.getElementById('p2');
        
        container.innerHTML = '';
        const opts = family.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
        s1.innerHTML = '<option value="">Отец</option>' + opts;
        s2.innerHTML = '<option value="">Мать</option>' + opts;

        family.forEach(m => {
            container.innerHTML += `
                <div class="card">
                    <span class="del" onclick="remove('${m.id}')">×</span>
                    <img src="${m.photo || 'https://placeholder.com'}">
                    <h3>${m.name}</h3>
                    <p>${m.role}</p>
                </div>
            `;
        });
    }

    // Запуск при загрузке
    load();
</script>
</body>
</html>
